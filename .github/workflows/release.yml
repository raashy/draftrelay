name: Publish package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.12.0
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - name: Install npm with trusted-publishing support
        run: npm install --global npm@11.18.0
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --prod --audit-level low
      - run: pnpm check
      - run: pnpm exec playwright install --with-deps chrome
      - run: docker compose up -d --wait postgres redis
      - name: Verify hosted migrations, tenant isolation, and browser flows
        shell: bash
        run: |
          MIGRATION_DATABASE_URL=postgres://draftrelay:draftrelay@localhost:5432/draftrelay pnpm db:migrate
          MIGRATION_DATABASE_URL=postgres://draftrelay:draftrelay@localhost:5432/draftrelay \
            RUNTIME_DATABASE_ROLE=draftrelay_app pnpm db:grant-runtime
          docker compose exec -T postgres createdb -U draftrelay draftrelay_test
          MIGRATION_DATABASE_URL=postgres://draftrelay:draftrelay@localhost:5432/draftrelay_test pnpm db:migrate
          MIGRATION_DATABASE_URL=postgres://draftrelay:draftrelay@localhost:5432/draftrelay_test \
            RUNTIME_DATABASE_ROLE=draftrelay_app pnpm db:grant-runtime
          TEST_DATABASE_URL=postgres://draftrelay_app:draftrelay_app@localhost:5432/draftrelay_test \
            pnpm exec vitest run src/cloud/*.integration.test.ts
          pnpm test:e2e
          docker build --tag draftrelay:release-check .
      - name: Scan the production image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: draftrelay:release-check
          format: table
          exit-code: "1"
          ignore-unfixed: false
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${PACKAGE_VERSION}"
      - run: npm publish --provenance --access public
