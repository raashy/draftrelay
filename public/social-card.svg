<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">DraftRelay — review and copy output from any AI agent</title>
  <desc id="desc">An editorial paper-and-ink preview showing a terminal result becoming a clean review card.</desc>
  <rect width="1200" height="630" fill="#f2efe7"/>
  <path d="M0 82h1200M0 548h1200M86 0v630M1114 0v630" stroke="#171713" stroke-width="2"/>
  <rect x="86" y="82" width="1028" height="466" fill="none" stroke="#171713" stroke-width="2"/>
  <rect x="120" y="116" width="64" height="64" fill="#171713"/>
  <text x="134" y="159" fill="#fbfaf6" font-family="Georgia,serif" font-size="26" font-style="italic" font-weight="700">D/</text>
  <text x="202" y="151" fill="#171713" font-family="Georgia,serif" font-size="38" font-weight="700">DraftRelay</text>
  <text x="202" y="174" fill="#58574f" font-family="monospace" font-size="12" letter-spacing="3">REVIEW INBOX</text>
  <text x="120" y="284" fill="#171713" font-family="Georgia,serif" font-size="66" letter-spacing="-3">Your agent finished.</text>
  <text x="120" y="354" fill="#bd3516" font-family="Georgia,serif" font-size="66" font-style="italic" letter-spacing="-3">Get the part you need.</text>
  <text x="122" y="415" fill="#58574f" font-family="Arial,sans-serif" font-size="23">Save the deliverable, not the conversation.</text>
  <g transform="translate(765 205) rotate(-2)">
    <rect x="10" y="12" width="250" height="210" fill="#f2542d"/>
    <rect width="250" height="210" fill="#fbfaf6" stroke="#171713" stroke-width="2"/>
    <text x="22" y="33" fill="#bd3516" font-family="monospace" font-size="10" font-weight="700">SLACK UPDATE · READY</text>
    <path d="M20 48h210" stroke="#171713"/>
    <text x="20" y="84" fill="#171713" font-family="Georgia,serif" font-size="25" font-weight="700">Checkout fix</text>
    <text x="20" y="114" fill="#58574f" font-family="Arial,sans-serif" font-size="13">92 tests passed.</text>
    <text x="20" y="138" fill="#58574f" font-family="Arial,sans-serif" font-size="13">Ready for staging.</text>
    <rect x="20" y="164" width="118" height="28" fill="#171713"/>
    <text x="35" y="183" fill="#fbfaf6" font-family="Arial,sans-serif" font-size="10" font-weight="700">COPY FOR SLACK</text>
  </g>
</svg>
